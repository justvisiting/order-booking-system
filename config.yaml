server:
  port: 8090
  read_timeout: 15s
  write_timeout: 15s

log:
  level: info

database:
  host: localhost
  port: 3306
  user: root
  password: ""
  name: orderdb
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

jwt:
  secret: change-me-in-production-use-env-var
  expiry: 24h

cors:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
  allowed_methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  allowed_headers:
    - Authorization
    - Content-Type
